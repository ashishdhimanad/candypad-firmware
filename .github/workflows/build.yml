name: Build QMK firmware

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    name: 'Build CandyPad Firmware'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Install QMK CLI
        run: |
          python3 -m pip install --user qmk

      - name: Clone QMK firmware (binepad fork)
        run: |
          qmk setup -y -H ~/qmk_firmware -b sr-candykeys-candypad binepad-global/qmk_firmware

      - name: Overlay board and keymap files
        run: |
          # Copy all keyboards/ files from userspace over QMK source
          # This ensures our STM32 board files override the upstream RP2040 ones
          if [ -d "keyboards" ]; then
            cp -rv keyboards/ ~/qmk_firmware/
          fi
          # Copy community modules if present
          if [ -d "modules" ]; then
            cp -rv modules/ ~/qmk_firmware/
          fi

      - name: Compile firmware
        run: |
          # Read build targets from qmk.json
          KEYBOARD=$(python3 -c "import json; d=json.load(open('qmk.json')); print(d['build_targets'][0][0])")
          KEYMAP=$(python3 -c "import json; d=json.load(open('qmk.json')); print(d['build_targets'][0][1])")
          cd ~/qmk_firmware
          qmk compile -kb "$KEYBOARD" -km "$KEYMAP"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firmware
          path: ~/qmk_firmware/*.bin
